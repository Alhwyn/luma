name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - run: bun test

      - name: Verify npm auth
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set"
            exit 1
          fi
          case "$NODE_AUTH_TOKEN" in
            npm_*|ghp_*|gho_*|github_pat_*)
              if [ "${NODE_AUTH_TOKEN#npm_}" = "$NODE_AUTH_TOKEN" ]; then
                echo "::error::NPM_TOKEN must be an npm token (npm_...), not a GitHub token"
                exit 1
              fi
              ;;
            *)
              echo "::error::NPM_TOKEN must be an npm access token (npm_...)"
              exit 1
              ;;
          esac
          npm whoami --registry https://registry.npmjs.org

      - name: Publish @alhwyn/luma
        run: |
          npm publish --access public --registry https://registry.npmjs.org || {
            code=$?
            version=$(node -p "require('./package.json').version")
            if npm view "@alhwyn/luma@${version}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
              echo "@alhwyn/luma@${version} already on npm"
              exit 0
            fi
            exit "$code"
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Point CLI at published SDK version
        run: |
          VERSION=$(node -p "require('../package.json').version")
          npm pkg set "dependencies[@alhwyn/luma]=^${VERSION}"
        working-directory: cli

      - name: Publish @alhwyn/luma-cli
        run: npm publish --access public --registry https://registry.npmjs.org
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
