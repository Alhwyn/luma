name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@alhwyn"

      - run: bun install --frozen-lockfile

      - run: bun test

      - name: Publish @alhwyn/luma
        run: |
          npm publish || {
            code=$?
            version=$(node -p "require('./package.json').version")
            if npm view "@alhwyn/luma@${version}" version >/dev/null 2>&1; then
              echo "@alhwyn/luma@${version} already published"
              exit 0
            fi
            exit "$code"
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Point CLI at published SDK version
        run: |
          VERSION=$(node -p "require('../package.json').version")
          npm pkg set "dependencies[@alhwyn/luma]=^${VERSION}"
        working-directory: cli

      - name: Publish @alhwyn/luma-cli
        run: npm publish
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
